name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          echo "Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/key
            StrictHostKeyChecking no" > ~/.ssh/config

      - name: Deploy to EC2
        run: |
          ssh ec2 << 'EOF'
            cd ~/StarVix-Systems
            git pull origin main
            npm install
            pm2 restart server
            pm2 save
          EOF
